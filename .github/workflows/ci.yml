name: Football App CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - uses: actions/checkout@v4

      # Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Backend
      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      # Frontend
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      # Docker Login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Backend Image
      - name: Build Backend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/football-backend:latest ./backend

      - name: Push Backend Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/football-backend:latest

      # Frontend Image
      - name: Build Frontend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/football-frontend:latest ./frontend

      - name: Push Frontend Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/football-frontend:latest

      # Nginx Image
      - name: Build Nginx Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/football-nginx:latest ./nginx

      - name: Push Nginx Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/football-nginx:latest

    deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Debug Secret Length
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" | wc -c

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/football-app
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f