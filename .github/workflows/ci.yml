name: Football App CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ---------- Backend ----------

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      # ---------- Frontend ----------

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

               # ---------- Login to Docker Hub ----------

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ---------- Build & Push Backend ----------

      - name: Build Backend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/football-backend:latest ./backend

      - name: Push Backend Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/football-backend:latest

      # ---------- Build & Push Frontend ----------

      - name: Build Frontend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/football-frontend:latest ./frontend

      - name: Push Frontend Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/football-frontend:latest

      # ---------- Build & Push Nginx ----------

      - name: Build Nginx Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/football-nginx:latest ./nginx

      - name: Push Nginx Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/football-nginx:latest