services:
  backend:
    build: ./backend
    image: annihilator29/football-backend:latest
    container_name: football-backend
    restart: unless-stopped

    env_file:
      - ./backend/.env

    expose:
      - "3000"

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    image: annihilator29/football-frontend:latest
    container_name: football-frontend
    restart: unless-stopped

    expose:
      - "80"

  nginx:
    build: ./nginx
    image: annihilator29/football-nginx:latest
    container_name: football-nginx
    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started